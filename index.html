<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mektup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 50%, #f8bbd0 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      padding: 20px 10px;
    }

    /* Arka plan parıltı efekti */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(240, 98, 146, 0.12) 0%, transparent 60%);
      animation: bgPulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes bgPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .baslik {
      position: relative;
      z-index: 1;
      color: #880e4f;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: clamp(1px, 0.5vw, 2px);
      margin-bottom: clamp(24px, 5vw, 50px);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInDown 1s ease forwards;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Zarf container */
    .zarf-wrapper {
      position: relative;
      width: 360px;
      height: 240px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .zarf-wrapper:hover .zarf-govde {
      box-shadow: 0 20px 60px rgba(233, 30, 99, 0.25), 0 0 0 1px rgba(233, 30, 99, 0.15);
    }

    /* Zarf gövdesi */
    .zarf-govde {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #e8c8b8, #c8a088);
      border-radius: 4px;
      box-shadow: 0 15px 40px rgba(120, 60, 40, 0.25);
      transition: box-shadow 0.4s ease;
      overflow: hidden;
    }

    /* Zarf alt üçgen (arka yüz) */
    .zarf-alt {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-bottom: 130px solid #a87860;
      z-index: 1;
    }

    /* Zarf yan üçgenleri */
    .zarf-sol {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-top: 120px solid transparent;
      border-bottom: 120px solid transparent;
      border-left: 155px solid #be9878;
      z-index: 2;
    }

    .zarf-sag {
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-top: 120px solid transparent;
      border-bottom: 120px solid transparent;
      border-right: 155px solid #b08868;
      z-index: 2;
    }

    /* Zarf kapak (üst flap) */
    .zarf-kapak {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      transform-origin: top center;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .zarf-kapak::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 140px solid #d4b09a;
    }

    /* Kapak açık hali */
    .zarf-wrapper.acik .zarf-kapak {
      transform: rotateX(180deg);
    }

    /* Mektup kağıdı */
    .mektup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%) scale(0.92);
      width: 300px;
      background: linear-gradient(160deg, #ffffff 0%, #fff0f5 100%);
      border-radius: 6px;
      padding: 30px 28px;
      z-index: 25;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      transition: transform 0.75s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
    }

    /* Mektup açık hali - zarfı kaplayacak şekilde ortada */
    .zarf-wrapper.acik .mektup {
      transform: translate(-50%, -52%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .ana-sahne {
      position: relative;
      z-index: 1;
      animation: fadeInUp 1s ease 0.3s forwards;
      opacity: 0;
    }

    /* Butonlar */
    .butonlar {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 20px;
      margin-top: 32px;
      animation: fadeInUp2 1s ease 0.6s forwards;
      opacity: 0;
    }

    /* Düşen ışık parçacıkları */
    .parcacik {
      position: fixed;
      top: -12px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: parcaDus linear infinite;
    }
    @keyframes parcaDus {
      0%   { transform: translateY(0) scale(1);    opacity: 0; }
      10%  { opacity: 1; }
      85%  { opacity: 0.7; }
      100% { transform: translateY(105vh) scale(0.5); opacity: 0; }
    }

    .btn {
      width: 120px;
      padding: 12px 0;
      background: transparent;
      border: 3px solid #7B1034;
      color: #7B1034;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      font-family: 'Georgia', serif;
    }

    .btn:hover {
      background: rgba(123, 16, 52, 0.08);
      border-color: #5a0020;
      color: #5a0020;
    }

    .btn-ac:active { background: rgba(66, 153, 225, 0.3); }
    .btn-kapat:active { background: rgba(66, 153, 225, 0.3); }

    .mektup-icerik {
      text-align: center;
    }

    .mektup-icerik .selam {
      font-size: 0.85rem;
      color: #718096;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .mektup-icerik .mesaj {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2d3748;
      line-height: 1.5;
      margin-bottom: 16px;
      font-style: italic;
    }

    .mektup-icerik .mesaj span {
      color: #e91e63;
      display: block;
      font-size: 1.8rem;
    }

    .mektup-icerik .alt-yazi {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 14px;
      line-height: 1.6;
    }

    .mektup-icerik .imza {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #4a5568;
      font-style: italic;
    }

    /* Ayırıcı çizgi */
    .cizgi {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e91e63, transparent);
      margin: 12px auto;
    }

    /* Tıklama ipucu */
    .ipucu {
      margin-top: 40px;
      color: rgba(136, 14, 79, 0.5);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: blink 2s ease-in-out infinite;
      opacity: 0;
      animation: fadeInUp2 1s ease 1s forwards, blink 2.5s ease-in-out 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    @keyframes fadeInUp2 {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 0.4; transform: translateY(0); }
    }

    /* Parlak köşe efekti */
    .zarf-govde::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 60%;
      height: 60%;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
      transform: rotate(45deg);
      transition: all 0.6s ease;
      pointer-events: none;
      z-index: 20;
    }

    .zarf-wrapper:hover .zarf-govde::after {
      top: -20%;
      left: -20%;
    }

    /* Dekoratif çizgiler zarfta */
    .zarf-govde::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 3px;
      pointer-events: none;
      z-index: 3;
    }

    /* Sealing wax / mühür efekti */
    .muhur {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      background: radial-gradient(circle at 35% 35%, #ffb3c6, #e8789a);
      border: 2px solid #c9677e;
      border-radius: 50%;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #fff;
      box-shadow: 0 2px 12px rgba(200, 80, 110, 0.5);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .zarf-wrapper.acik .muhur {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }

    /* Scroll animasyonlu mesaj satırları */
    .zarf-wrapper.acik .mektup-satir {
      animation: satirGel 0.5s ease forwards;
      opacity: 0;
    }

    .zarf-wrapper.acik .mektup-satir:nth-child(1) { animation-delay: 0.5s; }
    .zarf-wrapper.acik .mektup-satir:nth-child(2) { animation-delay: 0.7s; }
    .zarf-wrapper.acik .mektup-satir:nth-child(3) { animation-delay: 0.9s; }
    .zarf-wrapper.acik .mektup-satir:nth-child(4) { animation-delay: 1.1s; }

    @keyframes satirGel {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <p class="baslik">Sana bir mesajım var</p>

  <div class="ana-sahne">

    <div class="zarf-wrapper" id="zarf">

      <div class="mektup">
        <div class="mektup-icerik">
          <p class="mektup-satir mesaj"><span>SPORA GİT GIDILI</span></p>
        </div>
      </div>

      <div class="zarf-govde">
        <div class="zarf-alt"></div>
        <div class="zarf-sol"></div>
        <div class="zarf-sag"></div>
      </div>

      <div class="muhur">❤</div>

      <div class="zarf-kapak"></div>

    </div>

  </div>

  <div class="butonlar">
    <button class="btn btn-ac" onclick="zarfAc()">AÇ</button>
    <button class="btn btn-kapat" onclick="zarfKapat()">KAPAT</button>
  </div>

  <script>
    // Düşen ışık parçacıkları — sadece sol ve sağ kenarlarda
    const renkler = ['#FF1744','#FF6D00','#FFD600','#00E676','#00B0FF','#651FFF','#F50057','#76FF03','#FF4081','#00E5FF','#FFAB40','#EA80FC','#CCFF90','#80D8FF','#FF6E40','#B9F6CA'];
    for (let i = 0; i < 220; i++) {
      const p = document.createElement('div');
      p.classList.add('parcacik');
      const boyut = Math.random() * 7 + 4;
      const x = Math.random() * 100;
      const renk = renkler[Math.floor(Math.random() * renkler.length)];
      p.style.cssText = `
        left: ${x}vw;
        width: ${boyut}px;
        height: ${boyut}px;
        background: ${renk};
        box-shadow: 0 0 ${boyut * 2.5}px ${renk}, 0 0 ${boyut * 5}px ${renk}55;
        animation-duration: ${Math.random() * 4.5 + 3}s;
        animation-delay: ${Math.random() * 5}s;
        opacity: 0;
      `;
      document.body.appendChild(p);
    }

    // Mobil ölçekleme
    function olcekAyarla() {
      const sahne = document.querySelector('.ana-sahne');
      const butonlar = document.querySelector('.butonlar');
      const s = Math.min(1, (window.innerWidth * 0.97) / 355);
      if (s < 1) {
        sahne.style.transform = `scale(${s})`;
        sahne.style.transformOrigin = 'top center';
        sahne.style.marginBottom = Math.round(240 * (s - 1)) + 'px';
        butonlar.style.marginTop = Math.round(32 * s) + 'px';
      } else {
        sahne.style.transform = '';
        sahne.style.marginBottom = '';
        butonlar.style.marginTop = '';
      }
    }
    olcekAyarla();
    window.addEventListener('resize', olcekAyarla);

    const zarf = document.getElementById('zarf');

    function zarfAc() {
      zarf.classList.add('acik');
    }

    function zarfKapat() {
      zarf.classList.remove('acik');
    }
  </script>

</body>
</html>
